name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [server-test, client-test, db-test]
    steps:
      - uses: actions/checkout@v4
      - run: make ${{ matrix.target }}
