# Go-only codegen for server dev (Docker/Air). Use: buf generate --template buf.gen.go.yaml
# Full codegen: run both buf.gen.go.yaml and buf.gen.ts.yaml (see Makefile generate).
version: v2
plugins:
  - local: protoc-gen-go
    out: proto
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: proto
    opt: paths=source_relative
