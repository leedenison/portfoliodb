services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    command: ["postgres", "-c", "shared_preload_libraries=timescaledb"]
    environment:
      POSTGRES_USER: portfoliodb
      POSTGRES_PASSWORD: portfoliodb
      POSTGRES_DB: portfoliodb_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfoliodb"]
      interval: 2s
      timeout: 2s
      retries: 10

  redis:
    image: redis:alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10
