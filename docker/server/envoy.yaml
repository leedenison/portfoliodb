# Envoy config: serve SPA at / and gRPC-Web at /portfoliodb.*; CORS with credentials, cookie pass-through.
# When SPA is served at localhost:8080, origin is http://localhost:8080.
admin:
  address:
    socket_address: { address: 0.0.0.0, port_value: 9901 }

static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address: { address: 0.0.0.0, port_value: 8080 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: AUTO
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: local
                      domains: ["*"]
                      cors:
                        allow_origin_string_match:
                          - exact: "http://localhost:8080"
                          - exact: "http://localhost:3000"
                        allow_methods: GET, PUT, DELETE, POST, OPTIONS
                        allow_headers: "content-type,x-grpc-web,x-user-agent,grpc-timeout,cookie"
                        expose_headers: "grpc-status,grpc-message,set-cookie"
                        allow_credentials: true
                        max_age: "86400"
                      routes:
                        - match: { prefix: "/portfoliodb." }
                          route:
                            cluster: portfoliodb_grpc
                            timeout: 0s
                        - match: { prefix: "/" }
                          route:
                            cluster: spa
                            timeout: 0s
                http_filters:
                  - name: envoy.filters.http.grpc_web
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: portfoliodb_grpc
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: portfoliodb_grpc
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: portfoliodb, port_value: 50051 }
      http2_protocol_options: {}
    - name: spa
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: spa
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: client, port_value: 3000 }
