---
version: 2
interactions:
    # --- Phase 1: ImportCorporateEvents ---
    # The import resolves AAPL via the DB-only fallback path (no identifier
    # plugins called) because the asset_class field isn't propagated through
    # the gRPC transport as a non-default value. The instrument is created
    # with just the supplied MIC_TICKER identifier. No HTTP interactions.
    # The import's asset_class doesn't reach the plugin path, so the
    # instrument is created with just the supplied MIC_TICKER identifier
    # via ensureWithSuppliedIdentifier. No OpenFIGI cassette entry needed.

    # --- Phase 2: Stock + Option CSV upload ---
    # Stock: AAPL found in DB by MIC_TICKER → no plugin calls.
    # Option: AdjustOCCForKnownSplits adjusts OCC from 760→190 strike.
    #   Then OpenFIGI resolves the post-split OCC.

    # 4. OpenFIGI: resolve post-split option by adjusted OCC
    - id: 0
      request:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        content_length: 59
        host: api.openfigi.com
        body: '[{"idType":"OCC_SYMBOL","idValue":"AAPL  250117C00190000"}]'
        headers:
            Content-Type:
                - application/json
            X-Openfigi-Apikey:
                - REDACTED
        url: https://api.openfigi.com/v3/mapping
        method: POST
      response:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        transfer_encoding:
            - chunked
        content_length: -1
        uncompressed: true
        body: '[{"data":[{"figi":"BBG01SPLIT02","name":"January 25 Calls on AAPL US","ticker":"AAPL 01/17/25 C190","exchCode":"US","compositeFIGI":"BBG01SPLIT02","securityType":"Equity Option","marketSector":"Equity","shareClassFIGI":null,"securityType2":"Option","securityDescription":"AAPL US 01/17/25 C190"}]}]'
        headers:
            Content-Type:
                - application/json; charset=utf-8
        status: 200 OK
        code: 200
        duration: 150ms

    # --- Phase 2b: Price fetch (Massive) ---
    # Price fetcher requests daily bars. Empty results prevent fetch blocks.

    # 7. Massive: AAPL daily prices (recent window)
    - id: 1
      request:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        content_length: 0
        host: api.massive.com
        form:
            adjusted:
                - "false"
            apiKey:
                - REDACTED
            sort:
                - asc
        url: https://api.massive.com/v2/aggs/ticker/AAPL/range/1/day/2025-01-01/2025-07-19?adjusted=false&apiKey=REDACTED&sort=asc
        method: GET
      response:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        transfer_encoding:
            - chunked
        content_length: -1
        uncompressed: true
        body: '{"ticker":"AAPL","queryCount":0,"resultsCount":0,"adjusted":false,"results":[],"status":"OK","request_id":"test","count":0}'
        headers:
            Content-Type:
                - application/json
        status: 200 OK
        code: 200
        duration: 150ms

    # 8. Massive: AAPL daily prices (older window)
    - id: 2
