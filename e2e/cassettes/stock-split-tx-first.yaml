            to:
                - "2026-05-10"
        url: https://eodhd.com/api/div/AAPL.US?api_token=REDACTED&fmt=json&from=2024-06-15&to=2026-05-10
        method: GET
      response:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        content_length: -1
        uncompressed: true
        body: '[]'
        headers:
            Content-Type:
                - application/json
        status: 200 OK
        code: 200
        duration: 150ms
