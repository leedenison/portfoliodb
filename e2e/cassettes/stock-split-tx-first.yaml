---
version: 2
interactions:
    # --- Phase 1: Stock CSV upload (identifier resolution for AAPL stock) ---
    # All three identifier plugins run in parallel. EODHD and Massive fail;
    # each retries once. OpenFIGI succeeds on first call.

    # 0. EODHD search: AAPL (call)
    - id: 0
      request:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        content_length: 0
        host: eodhd.com
        form:
            api_token:
                - REDACTED
            fmt:
                - json
            limit:
                - "10"
            type:
                - stock
        url: https://eodhd.com/api/search/AAPL?api_token=REDACTED&fmt=json&limit=10&type=stock
        method: GET
      response:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        transfer_encoding:
            - chunked
        content_length: -1
        uncompressed: true
        body: '[]'
        headers:
            Content-Type:
                - application/json
        status: 200 OK
        code: 200
        duration: 150ms

    # 1. EODHD search: AAPL (retry)
    - id: 1
      request:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        content_length: 0
        host: eodhd.com
        form:
            api_token:
                - REDACTED
            fmt:
                - json
            limit:
                - "10"
            type:
                - stock
        url: https://eodhd.com/api/search/AAPL?api_token=REDACTED&fmt=json&limit=10&type=stock
        method: GET
      response:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        transfer_encoding:
            - chunked
        content_length: -1
        uncompressed: true
        body: '[]'
        headers:
            Content-Type:
                - application/json
        status: 200 OK
        code: 200
        duration: 150ms

    # 2. Massive reference: AAPL (call)
    - id: 2
      request:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        content_length: 0
        host: api.massive.com
        form:
            apiKey:
                - REDACTED
        url: https://api.massive.com/v3/reference/tickers/AAPL?apiKey=REDACTED
        method: GET
      response:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        transfer_encoding:
            - chunked
        content_length: -1
        uncompressed: true
        body: '{"results":{},"status":"NOT_FOUND","request_id":"test","count":0}'
        headers:
            Content-Type:
                - application/json
        status: 200 OK
        code: 200
        duration: 150ms

    # 3. Massive reference: AAPL (retry)
    - id: 3
      request:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        content_length: 0
        host: api.massive.com
        form:
            apiKey:
                - REDACTED
        url: https://api.massive.com/v3/reference/tickers/AAPL?apiKey=REDACTED
        method: GET
      response:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        transfer_encoding:
            - chunked
        content_length: -1
        uncompressed: true
        body: '{"results":{},"status":"NOT_FOUND","request_id":"test","count":0}'
        headers:
            Content-Type:
                - application/json
        status: 200 OK
        code: 200
        duration: 150ms

    # 4. OpenFIGI: resolve AAPL stock by TICKER
    - id: 4
      request:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        content_length: 38
        host: api.openfigi.com
        body: '[{"idType":"TICKER","idValue":"AAPL"}]'
        headers:
            Content-Type:
                - application/json
            X-Openfigi-Apikey:
                - REDACTED
        url: https://api.openfigi.com/v3/mapping
        method: POST
      response:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        transfer_encoding:
            - chunked
        content_length: -1
        uncompressed: true
        body: '[{"data":[{"figi":"BBG000B9XRY4","name":"APPLE INC","ticker":"AAPL","exchCode":"US","compositeFIGI":"BBG000B9XRY4","securityType":"Common Stock","marketSector":"Equity","shareClassFIGI":"BBG001S5N8V8","securityType2":"Common Stock","securityDescription":"AAPL"}]}]'
        headers:
            Content-Type:
                - application/json; charset=utf-8
        status: 200 OK
        code: 200
        duration: 150ms

    # --- Phase 1b: Option CSV upload (identifier resolution for option) ---
    # Option resolution only calls OpenFIGI (not EODHD/Massive).

    # 5. OpenFIGI: resolve pre-split option by OCC
    - id: 5
      request:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        content_length: 59
        host: api.openfigi.com
        body: '[{"idType":"OCC_SYMBOL","idValue":"AAPL  250117C00760000"}]'
        headers:
            Content-Type:
                - application/json
            X-Openfigi-Apikey:
                - REDACTED
        url: https://api.openfigi.com/v3/mapping
        method: POST
      response:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        transfer_encoding:
            - chunked
        content_length: -1
        uncompressed: true
        body: '[{"data":[{"figi":"BBG01SPLIT01","name":"January 25 Calls on AAPL US","ticker":"AAPL 01/17/25 C760","exchCode":"US","compositeFIGI":"BBG01SPLIT01","securityType":"Equity Option","marketSector":"Equity","shareClassFIGI":null,"securityType2":"Option","securityDescription":"AAPL US 01/17/25 C760"}]}]'
        headers:
            Content-Type:
                - application/json; charset=utf-8
        status: 200 OK
        code: 200
        duration: 150ms

    # --- Phase 1c: Price fetch (Massive) ---
    # Price fetcher requests daily bars. Empty results prevent fetch blocks.

    # 6. Massive: AAPL daily prices (recent window)
    - id: 6
      request:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        content_length: 0
        host: api.massive.com
        form:
            adjusted:
                - "false"
            apiKey:
                - REDACTED
            sort:
                - asc
        url: https://api.massive.com/v2/aggs/ticker/AAPL/range/1/day/2025-01-01/2025-07-19?adjusted=false&apiKey=REDACTED&sort=asc
        method: GET
      response:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        transfer_encoding:
            - chunked
        content_length: -1
        uncompressed: true
        body: '{"ticker":"AAPL","queryCount":0,"resultsCount":0,"adjusted":false,"results":[],"status":"OK","request_id":"test","count":0}'
        headers:
            Content-Type:
                - application/json
        status: 200 OK
        code: 200
        duration: 150ms

    # 7. Massive: AAPL daily prices (older window)
    - id: 7
      request:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        content_length: 0
        host: api.massive.com
        form:
            adjusted:
                - "false"
            apiKey:
                - REDACTED
            sort:
                - asc
        url: https://api.massive.com/v2/aggs/ticker/AAPL/range/1/day/2024-09-15/2025-04-02?adjusted=false&apiKey=REDACTED&sort=asc
        method: GET
      response:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        transfer_encoding:
            - chunked
        content_length: -1
        uncompressed: true
        body: '{"ticker":"AAPL","queryCount":0,"resultsCount":0,"adjusted":false,"results":[],"status":"OK","request_id":"test","count":0}'
        headers:
            Content-Type:
                - application/json
        status: 200 OK
        code: 200
        duration: 150ms

    # 8. Massive: option daily prices
    - id: 8
      request:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        content_length: 0
        host: api.massive.com
        form:
            adjusted:
                - "false"
            apiKey:
                - REDACTED
            sort:
                - asc
        url: https://api.massive.com/v2/aggs/ticker/O:AAPL250117C00760000/range/1/day/2024-06-15/2024-12-31?adjusted=false&apiKey=REDACTED&sort=asc
        method: GET
      response:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        transfer_encoding:
            - chunked
        content_length: -1
        uncompressed: true
        body: '{"ticker":"O:AAPL250117C00760000","queryCount":0,"resultsCount":0,"adjusted":false,"results":[],"status":"OK","request_id":"test","count":0}'
        headers:
            Content-Type:
                - application/json
        status: 200 OK
        code: 200
        duration: 150ms

    # 9-11. Massive: AAPL daily prices (additional windows -- the price
    # fetcher splits the full date range into ~200-day chunks; the number
    # of chunks depends on the distance from the tx dates to today).
    - id: 9
      request: &massive_aapl_price_req
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        content_length: 0
        host: api.massive.com
        form: {adjusted: ["false"], apiKey: ["REDACTED"], sort: ["asc"]}
        url: https://api.massive.com/v2/aggs/ticker/AAPL/range/1/day/2025-07-20/2026-02-04?adjusted=false&apiKey=REDACTED&sort=asc
        method: GET
      response: &massive_aapl_price_resp
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        transfer_encoding: [chunked]
        content_length: -1
        uncompressed: true
        body: '{"ticker":"AAPL","queryCount":0,"resultsCount":0,"adjusted":false,"results":[],"status":"OK","request_id":"test","count":0}'
        headers: {Content-Type: ["application/json"]}
        status: 200 OK
        code: 200
        duration: 150ms
    - id: 10
      request: *massive_aapl_price_req
      response: *massive_aapl_price_resp
    - id: 11
      request: *massive_aapl_price_req
      response: *massive_aapl_price_resp

    # 12-14. Massive: option daily prices (additional windows)
    - id: 12
      request: &massive_opt_price_req
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        content_length: 0
        host: api.massive.com
        form: {adjusted: ["false"], apiKey: ["REDACTED"], sort: ["asc"]}
        url: https://api.massive.com/v2/aggs/ticker/O:AAPL250117C00760000/range/1/day/2025-01-01/2025-07-19?adjusted=false&apiKey=REDACTED&sort=asc
        method: GET
      response: &massive_opt_price_resp
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        transfer_encoding: [chunked]
        content_length: -1
        uncompressed: true
        body: '{"ticker":"O:AAPL250117C00760000","queryCount":0,"resultsCount":0,"adjusted":false,"results":[],"status":"OK","request_id":"test","count":0}'
        headers: {Content-Type: ["application/json"]}
        status: 200 OK
        code: 200
        duration: 150ms
    - id: 13
      request: *massive_opt_price_req
      response: *massive_opt_price_resp
    - id: 14
      request: *massive_opt_price_req
      response: *massive_opt_price_resp

    # --- Phase 2: Corporate event fetch (after TriggerCorporateEventFetch) ---

    # 15. EODHD: splits for AAPL.US -- returns the 4:1 split
    - id: 15
      request:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        content_length: 0
        host: eodhd.com
        form:
            api_token:
                - REDACTED
            fmt:
                - json
            from:
                - "2024-06-15"
            to:
                - "2026-05-10"
        url: https://eodhd.com/api/splits/AAPL.US?api_token=REDACTED&fmt=json&from=2024-06-15&to=2026-05-10
        method: GET
      response:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        transfer_encoding:
            - chunked
        content_length: -1
        uncompressed: true
        body: '[{"date":"2024-08-01","split":"4.000000/1.000000"}]'
        headers:
            Content-Type:
                - application/json
        status: 200 OK
        code: 200
        duration: 150ms

    # 16. EODHD: dividends for AAPL.US -- empty
    - id: 16
      request:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        content_length: 0
        host: eodhd.com
        form:
            api_token:
                - REDACTED
            fmt:
                - json
            from:
                - "2024-06-15"
            to:
                - "2026-05-10"
        url: https://eodhd.com/api/div/AAPL.US?api_token=REDACTED&fmt=json&from=2024-06-15&to=2026-05-10
        method: GET
      response:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        transfer_encoding:
            - chunked
        content_length: -1
        uncompressed: true
        body: '[]'
        headers:
            Content-Type:
                - application/json
        status: 200 OK
        code: 200
        duration: 150ms
