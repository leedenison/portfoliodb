syntax = "proto3";

package portfoliodb.api.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/leedenison/portfoliodb/proto/api/v1;apiv1";

// Broker identifies the data source so that the same canonical value is used
// across users uploading data from the same broker.
enum Broker {
  BROKER_UNSPECIFIED = 0;
  IBKR        = 1;  // Interactive Brokers
  SCHB        = 2;  // Charles Schwab
  FIDELITY    = 3;
}

// OFX-style transaction types for investments.
enum TxType {
  TX_TYPE_UNSPECIFIED = 0;
  // Buys
  BUYDEBT  = 1;
  BUYMF    = 2;
  BUYOPT   = 3;
  BUYOTHER = 4;
  BUYSTOCK = 5;
  // Sells
  SELLDEBT  = 6;
  SELLMF    = 7;
  SELLOPT   = 8;
  SELLOTHER = 9;
  SELLSTOCK = 10;
  // Other
  INCOME         = 11;
  INVEXPENSE     = 12;
  REINVEST       = 13;
  RETOFCAP       = 14;
  SPLIT          = 15;
  TRANSFER       = 16;
  JRNLFUND       = 17;
  JRNLSEC        = 18;
  MARGININTEREST = 19;
  CLOSUREOPT     = 20;
  CASHFLOW       = 21;
  BUYFUTURE      = 22;
  SELLFUTURE     = 23;
}

// IdentifierType is the controlled vocabulary for instrument identifier types.
// Stored in instrument_identifiers.identifier_type. Broker description identifiers use BROKER_DESCRIPTION with domain = source (e.g. "Fidelity:web:fidelity-csv").
enum IdentifierType {
  IDENTIFIER_TYPE_UNSPECIFIED = 0;
  ISIN = 1;
  CUSIP = 2;
  SEDOL = 3;
  CINS = 4;
  WERTPAPIER = 5;
  OCC = 6;
  OPRA = 7;
  FUT_OPT = 8;
  OPENFIGI_GLOBAL = 9;
  OPENFIGI_SHARE_CLASS = 10;
  OPENFIGI_COMPOSITE = 11;
  BROKER_DESCRIPTION = 12;
  CURRENCY = 13;
  FX_PAIR = 14;
  MIC_TICKER = 15;
  OPENFIGI_TICKER = 16;
}

// AssetClass is the controlled vocabulary for instrument asset classes.
enum AssetClass {
  ASSET_CLASS_UNSPECIFIED = 0;
  ASSET_CLASS_STOCK       = 1;
  ASSET_CLASS_ETF         = 2;
  ASSET_CLASS_FIXED_INCOME = 3;
  ASSET_CLASS_MUTUAL_FUND = 4;
  ASSET_CLASS_OPTION      = 5;
  ASSET_CLASS_FUTURE      = 6;
  ASSET_CLASS_CASH        = 7;
  ASSET_CLASS_FX          = 8;
  ASSET_CLASS_UNKNOWN     = 9;
}

// InstrumentIdentifier is one (type, domain, value) for an instrument.
// For BROKER_DESCRIPTION, domain is the source (e.g. "Fidelity:web:fidelity-csv") and value is the instrument_description.
// For MIC_TICKER, domain is an ISO 10383 MIC code (or empty when unknown). For OPENFIGI_TICKER, domain is a Bloomberg/OpenFIGI exchange code (e.g. "US").
// canonical = false only for broker-description identifiers.
message InstrumentIdentifier {
  IdentifierType type = 1;
  string value = 2;
  bool canonical = 3;
  string domain = 4; // optional; MIC for MIC_TICKER, exchange code for OPENFIGI_TICKER, source for BROKER_DESCRIPTION
}

// Instrument is canonical security-master data for an instrument, with its identifiers.
// When asset_class is OPTION or FUTURE, underlying_id must be set.
message Instrument {
  string id = 1;
  AssetClass asset_class = 2;
  string exchange = 3;
  string currency = 4;
  string name = 5;
  repeated InstrumentIdentifier identifiers = 6;
  string underlying_id = 7;   // UUID of underlying instrument when this is a derivative (OPTION/FUTURE).
  google.protobuf.Timestamp valid_from = 8;  // When the instrument was available to trade (optional).
  google.protobuf.Timestamp valid_to = 9;    // When the instrument ceased to be available (optional).
  Instrument underlying = 10; // Populated in ListTxs/GetHoldings so clients need not fetch separately.
  Exchange exchange_info = 11; // Rich exchange data from exchanges table JOIN; populated when exchange_mic is set.
  string cik = 12;            // SEC Central Index Key (optional).
  string sic_code = 13;       // SIC industry classification code (optional).
}

// Exchange is ISO 10383 MIC reference data for an instrument's exchange.
message Exchange {
  string mic = 1;
  string name = 2;
  string acronym = 3;
  string country_code = 4;
}

// Tx represents one broker-reported transaction.
message Tx {
  // Time of the transaction (date or time as provided by broker). Required.
  google.protobuf.Timestamp timestamp = 1 [(buf.validate.field).required = true];
  // Broker's instrument description string. Required.
  string instrument_description = 2 [(buf.validate.field).string.min_len = 1];
  // OFX transaction type. Required.
  TxType type = 3 [(buf.validate.field).enum.defined_only = true];
  // Signed quantity: positive for buys/adds, negative for sells/reductions.
  double quantity = 4;
  // Currency in which the instrument is denominated (trading currency, e.g. EUR for SAF). Optional. Passed to plugins as the currency hint. For cash transactions only, set this (same as settlement when user selects one currency).
  string trading_currency = 5;
  // Currency used to pay/settle the transaction (e.g. GBP when buying in a UK account). Optional. Set from user input (e.g. Fidelity converter) for all transactions.
  string settlement_currency = 6;
  // Unit price as reported by broker. Optional; not used for valuation.
  double unit_price = 7;
  // Resolved instrument id (UUID). Set by identification during ingestion.
  string instrument_id = 8;
  // Account (opaque string). Required.
  string account = 9;
  // Optional external identifier hints (e.g. ISIN, CUSIP, FIGI, MIC_TICKER). When supplied, resolution uses these and does not store (source, description) on the instrument.
  repeated InstrumentIdentifier identifier_hints = 10;
  // NULL for real transactions, 'INITIALIZE' for synthetic opening-balance transactions.
  string synthetic_purpose = 11;
}

// ApiService provides gRPC endpoints for the web front end: portfolio CRUD,
// listing transactions and holdings, and ingestion job status.
service ApiService {
  // Portfolios
  rpc ListPortfolios(ListPortfoliosRequest) returns (ListPortfoliosResponse);
  rpc GetPortfolio(GetPortfolioRequest) returns (GetPortfolioResponse);
  rpc CreatePortfolio(CreatePortfolioRequest) returns (CreatePortfolioResponse);
  rpc UpdatePortfolio(UpdatePortfolioRequest) returns (UpdatePortfolioResponse);
  rpc DeletePortfolio(DeletePortfolioRequest) returns (DeletePortfolioResponse);
  rpc GetPortfolioFilters(GetPortfolioFiltersRequest) returns (GetPortfolioFiltersResponse);
  rpc SetPortfolioFilters(SetPortfolioFiltersRequest) returns (SetPortfolioFiltersResponse);
  rpc ListBrokersAndAccounts(ListBrokersAndAccountsRequest) returns (ListBrokersAndAccountsResponse);

  // Transactions and holdings: by portfolio view (portfolio_id set) or all user data (portfolio_id empty). Filtering is via portfolios only.
  rpc ListTxs(ListTxsRequest) returns (ListTxsResponse);
  rpc GetHoldings(GetHoldingsRequest) returns (GetHoldingsResponse);

  // Async ingestion job status and validation errors
  rpc GetJob(GetJobRequest) returns (GetJobResponse);
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);

  // Instruments: browse and search (any authenticated user).
  rpc ListInstruments(ListInstrumentsRequest) returns (ListInstrumentsResponse);

  // Instrument export/import (admin-only). Export streams instruments with at least one canonical identifier; optional exchange filter.
  rpc ExportInstruments(ExportInstrumentsRequest) returns (stream Instrument);
  rpc ImportInstruments(ImportInstrumentsRequest) returns (ImportInstrumentsResponse);

  // Identifier plugin config (admin-only). List all plugins; update enabled, precedence, and config JSON (including API keys).
  rpc ListIdentifierPlugins(ListIdentifierPluginsRequest) returns (ListIdentifierPluginsResponse);
  rpc UpdateIdentifierPlugin(UpdateIdentifierPluginRequest) returns (UpdateIdentifierPluginResponse);

  // Description plugin config (admin-only). List all plugins; update enabled, precedence, and config JSON.
  rpc ListDescriptionPlugins(ListDescriptionPluginsRequest) returns (ListDescriptionPluginsResponse);
  rpc UpdateDescriptionPlugin(UpdateDescriptionPluginRequest) returns (UpdateDescriptionPluginResponse);

  // Price plugin config (admin-only). List all plugins; update enabled, precedence, and config JSON.
  rpc ListPricePlugins(ListPricePluginsRequest) returns (ListPricePluginsResponse);
  rpc UpdatePricePlugin(UpdatePricePluginRequest) returns (UpdatePricePluginResponse);

  // Reorder plugins within a category (admin-only). Reassigns precedence in a
  // single transaction using deferred constraints. plugin_ids is ordered from
  // highest precedence (index 0) to lowest; all plugins in the category must
  // be present.
  rpc ReorderPlugins(ReorderPluginsRequest) returns (ReorderPluginsResponse);

  // Trigger a price fetch cycle (admin-only). Returns immediately; fetch runs async.
  // For use by external cron jobs or after manual data corrections.
  rpc TriggerPriceFetch(TriggerPriceFetchRequest) returns (TriggerPriceFetchResponse);

  // Price fetch blocks (admin-only). Permanently blocked (instrument, plugin) pairs.
  rpc ListPriceFetchBlocks(ListPriceFetchBlocksRequest) returns (ListPriceFetchBlocksResponse);
  rpc DeletePriceFetchBlock(DeletePriceFetchBlockRequest) returns (DeletePriceFetchBlockResponse);

  // Portfolio valuation: daily portfolio value over a date range.
  rpc GetPortfolioValuation(GetPortfolioValuationRequest) returns (GetPortfolioValuationResponse);

  // EOD prices (admin-only). Browse cached price data.
  rpc ListPrices(ListPricesRequest) returns (ListPricesResponse);

  // Price export/import (admin-only). Export streams all cached EOD prices with best identifier per instrument; import upserts with data_provider = "import".
  rpc ExportPrices(ExportPricesRequest) returns (stream ExportPriceRow);
  rpc ImportPrices(ImportPricesRequest) returns (ImportPricesResponse);

  // Telemetry counters (admin-only). Returns counters discovered from Redis (portfoliodb:counters:*).
  rpc ListTelemetryCounters(ListTelemetryCountersRequest) returns (ListTelemetryCountersResponse);

  // Worker status (admin-only). Returns current state of background workers.
  rpc ListWorkers(ListWorkersRequest) returns (ListWorkersResponse);

  // Holding declarations: declare known holding quantities at a point in time.
  rpc ListHoldingDeclarations(ListHoldingDeclarationsRequest) returns (ListHoldingDeclarationsResponse);
  rpc CreateHoldingDeclaration(CreateHoldingDeclarationRequest) returns (CreateHoldingDeclarationResponse);
  rpc UpdateHoldingDeclaration(UpdateHoldingDeclarationRequest) returns (UpdateHoldingDeclarationResponse);
  rpc DeleteHoldingDeclaration(DeleteHoldingDeclarationRequest) returns (DeleteHoldingDeclarationResponse);

  // Display currency preference.
  rpc GetDisplayCurrency(GetDisplayCurrencyRequest) returns (GetDisplayCurrencyResponse);
  rpc SetDisplayCurrency(SetDisplayCurrencyRequest) returns (SetDisplayCurrencyResponse);
  // Ignored asset classes: skip tx types mapping to these classes during ingestion.
  rpc GetIgnoredAssetClasses(GetIgnoredAssetClassesRequest) returns (GetIgnoredAssetClassesResponse);
  rpc SetIgnoredAssetClasses(SetIgnoredAssetClassesRequest) returns (SetIgnoredAssetClassesResponse);
  rpc CountIgnoredTxs(CountIgnoredTxsRequest) returns (CountIgnoredTxsResponse);

  // Price gaps (admin-only). Returns date ranges where prices are needed but not cached.
  rpc ListPriceGaps(ListPriceGapsRequest) returns (ListPriceGapsResponse);

  // Inflation indices (admin-only). Browse stored monthly inflation data.
  rpc ListInflationIndices(ListInflationIndicesRequest) returns (ListInflationIndicesResponse);

  // Inflation plugin config (admin-only). List all plugins; update enabled, precedence, and config JSON.
  rpc ListInflationPlugins(ListInflationPluginsRequest) returns (ListInflationPluginsResponse);
  rpc UpdateInflationPlugin(UpdateInflationPluginRequest) returns (UpdateInflationPluginResponse);

  // Trigger an inflation fetch cycle (admin-only). Returns immediately; fetch runs async.
  rpc TriggerInflationFetch(TriggerInflationFetchRequest) returns (TriggerInflationFetchResponse);
}

// Portfolio is a user-owned container for transactions and holdings.
message Portfolio {
  string id = 1;
  string name = 2;
  google.protobuf.Timestamp created_at = 3;
}

// ListPortfolios returns portfolios owned by the authenticated user.
message ListPortfoliosRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListPortfoliosResponse {
  repeated Portfolio portfolios = 1;
  string next_page_token = 2;
}

message GetPortfolioRequest {
  string portfolio_id = 1;
}

message GetPortfolioResponse {
  Portfolio portfolio = 1;
}

message CreatePortfolioRequest {
  string name = 1;
}

message CreatePortfolioResponse {
  Portfolio portfolio = 1;
}

message UpdatePortfolioRequest {
  string portfolio_id = 1;
  string name = 2;
}

message UpdatePortfolioResponse {
  Portfolio portfolio = 1;
}

message DeletePortfolioRequest {
  string portfolio_id = 1;
}

message DeletePortfolioResponse {}

// Portfolio filter: one of broker, account, or instrument. filter_value is broker name, account string, or instrument UUID.
message PortfolioFilterProto {
  string filter_type = 1;   // "broker", "account", "instrument"
  string filter_value = 2;
}

message GetPortfolioFiltersRequest {
  string portfolio_id = 1;
}

message GetPortfolioFiltersResponse {
  repeated PortfolioFilterProto filters = 1;
}

message SetPortfolioFiltersRequest {
  string portfolio_id = 1;
  repeated PortfolioFilterProto filters = 2;
}

message SetPortfolioFiltersResponse {}

// ListBrokersAndAccounts returns distinct broker/account pairs for the authenticated user.
message ListBrokersAndAccountsRequest {}

// BrokerAccounts groups accounts under a single broker.
message BrokerAccounts {
  string broker = 1;
  repeated string accounts = 2;
}

message ListBrokersAndAccountsResponse {
  repeated BrokerAccounts brokers = 1;
}

// PortfolioTx pairs a transaction with its broker, account, and optional resolved instrument for list responses.
message PortfolioTx {
  Broker broker = 1;
  Tx tx = 2;
  Instrument instrument = 3;  // optional; set when instrument_id was resolved
  string account = 4;  // from Tx; echoed for convenience when listing
}

message ListTxsRequest {
  string portfolio_id = 1;  // if set, list txs in this portfolio view; otherwise all user transactions
  google.protobuf.Timestamp period_from = 2;
  google.protobuf.Timestamp period_to = 3;
  int32 page_size = 4;
  string page_token = 5;
}

message ListTxsResponse {
  repeated PortfolioTx txs = 1;
  string next_page_token = 2;
}

// Holding is the aggregate quantity of an instrument in a portfolio (or per account for user/portfolio views).
message Holding {
  Broker broker = 1;
  string instrument_description = 2;
  double quantity = 3;
  // Resolved instrument id (UUID). Set when identification ran for the underlying txs.
  string instrument_id = 4;
  Instrument instrument = 5;  // optional; set when instrument_id was resolved
  string account = 6;  // account string from txs; holdings are grouped by (broker, account, instrument)
}

message GetHoldingsRequest {
  string portfolio_id = 1;
  google.protobuf.Timestamp as_of = 2;
}

message GetHoldingsResponse {
  repeated Holding holdings = 1;
  google.protobuf.Timestamp as_of = 2;
}

// Job status for async ingestion.
enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  PENDING = 1;
  RUNNING = 2;
  SUCCESS = 3;
  FAILED = 4;
}

message ValidationError {
  int32 row_index = 1;
  string field = 2;
  string message = 3;
}

// IdentificationError is recorded when identification fails (e.g. plugin timeout) or broker description only.
message IdentificationError {
  int32 row_index = 1;
  string instrument_description = 2;
  string message = 3;
}

message GetJobRequest {
  string job_id = 1;
}

message GetJobResponse {
  JobStatus status = 1;
  repeated ValidationError validation_errors = 2;
  repeated IdentificationError identification_errors = 3;
  int32 total_count = 4;
  int32 processed_count = 5;
}

// Job is an ingestion job summary for list views.
message Job {
  string id = 1;
  string filename = 2;
  string broker = 3;
  JobStatus status = 4;
  google.protobuf.Timestamp created_at = 5;
  int32 validation_error_count = 6;
  int32 identification_error_count = 7;
  string job_type = 8;  // "tx" or "price"
}

message ListJobsRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListJobsResponse {
  repeated Job jobs = 1;
  string next_page_token = 2;
  int32 total_count = 3;
}

// ListInstruments returns instruments sorted alphabetically by display name (ticker, name, or broker description).
// Optional search filters by display name (case-insensitive substring match).
message ListInstrumentsRequest {
  string search = 1;       // optional; matched against display name (ticker, name, or broker description)
  int32 page_size = 2;
  string page_token = 3;
  repeated AssetClass asset_classes = 4;  // optional; filter by asset class. Empty = all.
}

message ListInstrumentsResponse {
  repeated Instrument instruments = 1;
  string next_page_token = 2;
  int32 total_count = 3;  // total matching instruments (for UI pagination display)
}

// ExportInstruments streams all instruments that have at least one canonical identifier. Optional exchange filter.
message ExportInstrumentsRequest {
  string exchange = 1;  // optional; empty = all exchanges
}

// ImportInstruments ensures the given instruments exist (find-or-create by identifiers, merge on conflict). No overwrite of canonical fields for existing.
message ImportInstrumentsRequest {
  repeated Instrument instruments = 1;
}

message ImportInstrumentsResponse {
  int32 ensured_count = 1;
  repeated ImportInstrumentError errors = 2;
}

message ImportInstrumentError {
  int32 index = 1;    // index into request.instruments
  string message = 2;
}

// IdentifierPluginConfig is one row from identifier_plugin_config (admin-only).
message IdentifierPluginConfig {
  string plugin_id = 1;
  bool enabled = 2;
  int32 precedence = 3;
  string config_json = 4;  // JSON object; may contain API keys; only admins can read/write
  string display_name = 5; // human-readable name from the plugin (e.g. "OpenFIGI")
}

message ListIdentifierPluginsRequest {}

message ListIdentifierPluginsResponse {
  repeated IdentifierPluginConfig plugins = 1;
}

message UpdateIdentifierPluginRequest {
  string plugin_id = 1;
  optional bool enabled = 2;
  // Precedence must be unique across all identifier plugins. The constraint is
  // deferrable, so swaps can be performed within a transaction.
  optional int32 precedence = 3;
  optional string config_json = 4;  // JSON object; merged or replaced per implementation
}

message UpdateIdentifierPluginResponse {
  IdentifierPluginConfig plugin = 1;
}

// DescriptionPluginConfig is one row from description_plugin_config (admin-only).
message DescriptionPluginConfig {
  string plugin_id = 1;
  bool enabled = 2;
  int32 precedence = 3;
  string config_json = 4;  // JSON object; may contain API keys; only admins can read/write
  string display_name = 5; // human-readable name from the plugin (e.g. "OpenAI")
}

message ListDescriptionPluginsRequest {}

message ListDescriptionPluginsResponse {
  repeated DescriptionPluginConfig plugins = 1;
}

message UpdateDescriptionPluginRequest {
  string plugin_id = 1;
  optional bool enabled = 2;
  // Precedence must be unique across all description plugins. The constraint is
  // deferrable, so swaps can be performed within a transaction.
  optional int32 precedence = 3;
  optional string config_json = 4;
}

message UpdateDescriptionPluginResponse {
  DescriptionPluginConfig plugin = 1;
}

// PricePluginConfig is one row from price_plugin_config (admin-only).
message PricePluginConfig {
  string plugin_id = 1;
  bool enabled = 2;
  int32 precedence = 3;
  string config_json = 4;  // JSON object; may contain API keys; only admins can read/write
  string display_name = 5; // human-readable name from the plugin (e.g. "Massive")
  optional int32 max_history_days = 6; // max lookback depth in days; 0/absent = unlimited
}

message ListPricePluginsRequest {}

message ListPricePluginsResponse {
  repeated PricePluginConfig plugins = 1;
}

message UpdatePricePluginRequest {
  string plugin_id = 1;
  optional bool enabled = 2;
  // Precedence must be unique across all price plugins. The constraint is
  // deferrable, so swaps can be performed within a transaction.
  optional int32 precedence = 3;
  optional string config_json = 4;
  optional int32 max_history_days = 5; // 0 = clear (NULL in DB), positive = set
}

message UpdatePricePluginResponse {
  PricePluginConfig plugin = 1;
}

// ReorderPluginsRequest sets precedence for all plugins in a category.
// plugin_ids is ordered from highest precedence (index 0) to lowest.
message ReorderPluginsRequest {
  string category = 1;            // "identifier", "description", "price", or "inflation"
  repeated string plugin_ids = 2; // all plugin IDs in the category, highest precedence first
}

message ReorderPluginsResponse {}

message TriggerPriceFetchRequest {}

message TriggerPriceFetchResponse {}

// PriceFetchBlock is a permanently blocked (instrument, plugin) pair.
message PriceFetchBlock {
  string instrument_id = 1;
  string plugin_id = 2;
  string reason = 3;
  google.protobuf.Timestamp created_at = 4;
  string plugin_display_name = 5;
  string instrument_display_name = 6;
}

message ListPriceFetchBlocksRequest {}

message ListPriceFetchBlocksResponse {
  repeated PriceFetchBlock blocks = 1;
}

message DeletePriceFetchBlockRequest {
  string instrument_id = 1;
  string plugin_id = 2;
}

message DeletePriceFetchBlockResponse {}

message ListTelemetryCountersRequest {}

message TelemetryCounter {
  string name = 1;
  int64 value = 2;
}

message ListTelemetryCountersResponse {
  repeated TelemetryCounter counters = 1;
}

// EODPriceProto is a single end-of-day price row for admin browsing.
message EODPriceProto {
  string instrument_id = 1;
  string instrument_display_name = 2;
  string price_date = 3;               // "YYYY-MM-DD"
  optional double open = 4;
  optional double high = 5;
  optional double low = 6;
  double close = 7;
  optional double adjusted_close = 8;
  optional int64 volume = 9;
  string data_provider = 10;
  google.protobuf.Timestamp fetched_at = 11;
  bool synthetic = 12;
}

message ListPricesRequest {
  string search = 1;          // instrument name/ticker substring
  string date_from = 2;       // "YYYY-MM-DD", inclusive
  string date_to = 3;         // "YYYY-MM-DD", inclusive
  string data_provider = 4;
  int32 page_size = 5;
  string page_token = 6;
}

message ListPricesResponse {
  repeated EODPriceProto prices = 1;
  string next_page_token = 2;
  int32 total_count = 3;
}

// ExportPrices streams all cached EOD prices. Each row carries the best identifier for the instrument.
message ExportPricesRequest {}

// ExportPriceRow is one price row with instrument identifier context.
message ExportPriceRow {
  string identifier_type = 1;    // IdentifierType name (e.g. "ISIN", "MIC_TICKER", "OPENFIGI_TICKER")
  string identifier_value = 2;
  string identifier_domain = 3;  // MIC for MIC_TICKER, exchange code for OPENFIGI_TICKER, source for BROKER_DESCRIPTION, empty otherwise
  string price_date = 4;         // "YYYY-MM-DD"
  optional double open = 5;
  optional double high = 6;
  optional double low = 7;
  double close = 8;
  optional double adjusted_close = 9;
  optional int64 volume = 10;
  AssetClass asset_class = 11;   // denormalized from instrument
}

// ImportPriceRow is one price row to import. When the instrument is unknown, asset_class
// is used as the security type hint for identifier plugin routing. When UNSPECIFIED, plugins
// are skipped and the instrument is created with just the supplied identifier.
message ImportPriceRow {
  string identifier_type = 1;
  string identifier_value = 2;
  string identifier_domain = 3;
  string price_date = 4;
  optional double open = 5;
  optional double high = 6;
  optional double low = 7;
  double close = 8;
  optional double adjusted_close = 9;
  optional int64 volume = 10;
  AssetClass asset_class = 11;   // optional; security type hint for plugin routing on unknown instruments
}

message ImportPricesRequest {
  repeated ImportPriceRow prices = 1;
  // Optional coverage ranges. When set for an instrument, the server uses
  // UpsertPricesWithFill to generate synthetic LOCF prices for non-trading
  // days within each range. When absent, prices are upserted as-is.
  repeated ImportCoverage coverage = 2;
}

// ImportCoverage declares that the caller intends to cover a date range for
// an instrument. The server fills gaps within this range with synthetic prices.
message ImportCoverage {
  string identifier_type = 1;
  string identifier_value = 2;
  string identifier_domain = 3;
  string from = 4; // YYYY-MM-DD, inclusive
  string to = 5;   // YYYY-MM-DD, exclusive
}

message ImportPricesResponse {
  string job_id = 1;
}

message ImportPriceError {
  int32 index = 1;    // index into request.prices
  string message = 2;
}

// GetPortfolioValuation computes daily portfolio values over a date range.
// display_currency converts holdings to the given currency (ISO 4217, e.g. "USD").
// When empty, the user's stored preference is used.
message GetPortfolioValuationRequest {
  string portfolio_id = 1;
  string date_from = 2 [(buf.validate.field).string.min_len = 1];     // "YYYY-MM-DD"
  string date_to = 3 [(buf.validate.field).string.min_len = 1];       // "YYYY-MM-DD"
  string display_currency = 4;
}

// ValuationPoint is one day's portfolio value.
// total_value sums only priced instruments; unpriced_instruments lists display
// names for instruments missing prices on that date.
message ValuationPoint {
  string date = 1;
  double total_value = 2;
  repeated string unpriced_instruments = 3;
}

message GetPortfolioValuationResponse {
  repeated ValuationPoint points = 1;
}

// HoldingDeclaration is a user-provided statement of known holding quantity at a date.
message HoldingDeclaration {
  string id = 1;
  string broker = 2;
  string account = 3;
  string instrument_id = 4;
  Instrument instrument = 5;  // optional; populated when listing
  string declared_qty = 6;    // numeric string to preserve precision
  string as_of_date = 7;      // "YYYY-MM-DD"
}

message ListHoldingDeclarationsRequest {}

message ListHoldingDeclarationsResponse {
  repeated HoldingDeclaration declarations = 1;
}

message CreateHoldingDeclarationRequest {
  string broker = 1 [(buf.validate.field).string.min_len = 1];
  string account = 2;
  string instrument_id = 3 [(buf.validate.field).string.min_len = 1];
  string declared_qty = 4 [(buf.validate.field).string.min_len = 1];    // numeric string
  string as_of_date = 5 [(buf.validate.field).string.min_len = 1];      // "YYYY-MM-DD"
}

message CreateHoldingDeclarationResponse {
  HoldingDeclaration declaration = 1;
}

message UpdateHoldingDeclarationRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
  string declared_qty = 2 [(buf.validate.field).string.min_len = 1];    // numeric string
  string as_of_date = 3 [(buf.validate.field).string.min_len = 1];      // "YYYY-MM-DD"
}

message UpdateHoldingDeclarationResponse {
  HoldingDeclaration declaration = 1;
}

message DeleteHoldingDeclarationRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

message DeleteHoldingDeclarationResponse {}

// Display currency preference (ISO 4217 code).
message GetDisplayCurrencyRequest {}

message GetDisplayCurrencyResponse {
  string display_currency = 1;
}

message SetDisplayCurrencyRequest {
  string display_currency = 1;
}

message SetDisplayCurrencyResponse {
  string display_currency = 1;
}

// Worker status for admin monitoring and e2e test polling.
enum WorkerState {
  WORKER_STATE_UNSPECIFIED = 0;
  WORKER_STATE_IDLE = 1;
  WORKER_STATE_RUNNING = 2;
}

message Worker {
  string name = 1;
  WorkerState state = 2;
  string summary = 3;
  int32 queue_depth = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message ListWorkersRequest {}

message ListWorkersResponse {
  repeated Worker workers = 1;
}

// Ignored asset classes: per-broker/account rules to skip tx types during ingestion.
message IgnoredAssetClassRule {
  string broker = 1;
  string account = 2;      // empty = all accounts for broker
  AssetClass asset_class = 3;
}

message GetIgnoredAssetClassesRequest {}

message GetIgnoredAssetClassesResponse {
  repeated IgnoredAssetClassRule rules = 1;
}

message SetIgnoredAssetClassesRequest {
  repeated IgnoredAssetClassRule rules = 1;
}

message SetIgnoredAssetClassesResponse {}

message CountIgnoredTxsRequest {
  repeated IgnoredAssetClassRule rules = 1;
}

message CountIgnoredTxsResponse {
  int32 tx_count = 1;
  int32 declaration_count = 2;
}

// ListPriceGaps returns date ranges where prices are needed but not cached.
// Filters by asset class; empty = all. Includes both instrument price gaps
// and FX rate gaps.
message ListPriceGapsRequest {
  repeated AssetClass asset_classes = 1;
}

// PriceGap is one instrument with its missing price date ranges.
message PriceGap {
  string instrument_id = 1;
  InstrumentIdentifier identifier = 2;
  AssetClass asset_class = 3;
  string exchange = 4;
  string currency = 5;
  string name = 6;
  repeated DateRange gaps = 7;
}

// DateRange is a half-open [from, to) date range.
message DateRange {
  string from = 1; // YYYY-MM-DD, inclusive
  string to = 2;   // YYYY-MM-DD, exclusive
}

message ListPriceGapsResponse {
  repeated PriceGap price_gaps = 1;
  repeated PriceGap fx_gaps = 2;
}

// InflationIndexProto is a single monthly inflation index value for the admin UI.
message InflationIndexProto {
  string currency = 1;        // ISO 4217 (e.g. "GBP")
  string month = 2;           // "YYYY-MM-DD" (1st of month)
  double index_value = 3;
  int32 base_year = 4;
  string data_provider = 5;
}

message ListInflationIndicesRequest {
  string currency = 1;        // optional filter
  string date_from = 2;       // "YYYY-MM-DD"
  string date_to = 3;         // "YYYY-MM-DD"
  int32 page_size = 4;
  string page_token = 5;
}

message ListInflationIndicesResponse {
  repeated InflationIndexProto indices = 1;
  string next_page_token = 2;
  int32 total_count = 3;
}

// InflationPluginConfig describes an inflation plugin's admin-visible state.
message InflationPluginConfig {
  string plugin_id = 1;
  bool enabled = 2;
  int32 precedence = 3;
  string config_json = 4;
  string display_name = 5;
}

message ListInflationPluginsRequest {}

message ListInflationPluginsResponse {
  repeated InflationPluginConfig plugins = 1;
}

message UpdateInflationPluginRequest {
  string plugin_id = 1;
  optional bool enabled = 2;
  optional int32 precedence = 3;
  optional string config_json = 4;
}

message UpdateInflationPluginResponse {
  InflationPluginConfig plugin = 1;
}

message TriggerInflationFetchRequest {}

message TriggerInflationFetchResponse {}
