syntax = "proto3";

package portfoliodb.api.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/leedenison/portfoliodb/proto/api/v1;apiv1";

// Broker identifies the data source so that the same canonical value is used
// across users uploading data from the same broker.
enum Broker {
  BROKER_UNSPECIFIED = 0;
  IBKR        = 1;  // Interactive Brokers
  SCHB        = 2;  // Charles Schwab
}

// OFX-style transaction types for investments.
enum TxType {
  TX_TYPE_UNSPECIFIED = 0;
  // Buys
  BUYDEBT  = 1;
  BUYMF    = 2;
  BUYOPT   = 3;
  BUYOTHER = 4;
  BUYSTOCK = 5;
  // Sells
  SELLDEBT  = 6;
  SELLMF    = 7;
  SELLOPT   = 8;
  SELLOTHER = 9;
  SELLSTOCK = 10;
  // Other
  INCOME         = 11;
  INVEXPENSE     = 12;
  REINVEST       = 13;
  RETOFCAP       = 14;
  SPLIT          = 15;
  TRANSFER       = 16;
  JRNLFUND       = 17;
  JRNLSEC        = 18;
  MARGININTEREST = 19;
  CLOSUREOPT     = 20;
}

// InstrumentIdentifier is one (type, value) pair for an instrument (e.g. CUSIP, ISIN, broker description).
// canonical = false only for broker-description identifiers; true for standard identifiers (ISIN, CUSIP, etc.).
message InstrumentIdentifier {
  string type = 1;   // e.g. "CUSIP", "ISIN", "IBKR", "SCHB"
  string value = 2;
  bool canonical = 3;
}

// Instrument is canonical security-master data for an instrument, with its identifiers.
// asset_class must be one of: EQUITY, ETF, MF, CASH, FIXED_INCOME, OPTION, FUTURE.
// When asset_class is OPTION or FUTURE, underlying_id must be set.
message Instrument {
  string id = 1;
  string asset_class = 2;
  string exchange = 3;
  string currency = 4;
  string name = 5;
  repeated InstrumentIdentifier identifiers = 6;
  string underlying_id = 7;   // UUID of underlying instrument when this is a derivative (OPTION/FUTURE).
  google.protobuf.Timestamp valid_from = 8;  // When the instrument was available to trade (optional).
  google.protobuf.Timestamp valid_to = 9;    // When the instrument ceased to be available (optional).
  Instrument underlying = 10; // Populated in ListTxs/GetHoldings so clients need not fetch separately.
}

// Tx represents one broker-reported transaction.
message Tx {
  // Time of the transaction (part of natural key with broker and
  // instrument_description). Required.
  google.protobuf.Timestamp timestamp = 1;
  // Broker's instrument description string. Part of natural key. Required.
  string instrument_description = 3;
  // OFX transaction type. Required.
  TxType type = 4;
  // Signed quantity: positive for buys/adds, negative for sells/reductions.
  double quantity = 5;
  // Currency code (e.g. USD). Optional; validation may report unknown currency
  // in async job.
  string currency = 6;
  // Unit price as reported by broker. Optional; not used for valuation.
  double unit_price = 7;
  // Resolved instrument id (UUID). Set by identification during ingestion.
  string instrument_id = 8;
}

// CreateUserRequest supplies user info from the ID token (stub in M01).
message CreateUserRequest {
  string auth_sub = 1;
  string name = 2;
  string email = 3;
}

message CreateUserResponse {
  string user_id = 1;
}

// ApiService provides gRPC endpoints for the web front end: portfolio CRUD,
// listing transactions and holdings, and ingestion job status.
service ApiService {
  // CreateUser registers the authenticated user from ID token. Stubbed in M01.
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);

  // Portfolios
  rpc ListPortfolios(ListPortfoliosRequest) returns (ListPortfoliosResponse);
  rpc GetPortfolio(GetPortfolioRequest) returns (GetPortfolioResponse);
  rpc CreatePortfolio(CreatePortfolioRequest) returns (CreatePortfolioResponse);
  rpc UpdatePortfolio(UpdatePortfolioRequest) returns (UpdatePortfolioResponse);
  rpc DeletePortfolio(DeletePortfolioRequest) returns (DeletePortfolioResponse);

  // Transactions and holdings for a portfolio
  rpc ListTxs(ListTxsRequest) returns (ListTxsResponse);
  rpc GetHoldings(GetHoldingsRequest) returns (GetHoldingsResponse);

  // Async ingestion job status and validation errors
  rpc GetJob(GetJobRequest) returns (GetJobResponse);

  // Instrument export/import (admin-only when roles enforced). Export streams instruments with at least one canonical identifier; optional exchange filter.
  rpc ExportInstruments(ExportInstrumentsRequest) returns (stream Instrument);
  rpc ImportInstruments(ImportInstrumentsRequest) returns (ImportInstrumentsResponse);
}

// Portfolio is a user-owned container for transactions and holdings.
message Portfolio {
  string id = 1;
  string name = 2;
  google.protobuf.Timestamp created_at = 3;
}

// ListPortfolios returns portfolios owned by the authenticated user.
message ListPortfoliosRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListPortfoliosResponse {
  repeated Portfolio portfolios = 1;
  string next_page_token = 2;
}

message GetPortfolioRequest {
  string portfolio_id = 1;
}

message GetPortfolioResponse {
  Portfolio portfolio = 1;
}

message CreatePortfolioRequest {
  string name = 1;
}

message CreatePortfolioResponse {
  Portfolio portfolio = 1;
}

message UpdatePortfolioRequest {
  string portfolio_id = 1;
  string name = 2;
}

message UpdatePortfolioResponse {
  Portfolio portfolio = 1;
}

message DeletePortfolioRequest {
  string portfolio_id = 1;
}

message DeletePortfolioResponse {}

// PortfolioTx pairs a transaction with its broker and optional resolved instrument for list responses.
message PortfolioTx {
  Broker broker = 1;
  Tx tx = 2;
  Instrument instrument = 3;  // optional; set when instrument_id was resolved
}

message ListTxsRequest {
  string portfolio_id = 1;
  Broker broker = 2;
  google.protobuf.Timestamp period_from = 3;
  google.protobuf.Timestamp period_to = 4;
  int32 page_size = 5;
  string page_token = 6;
}

message ListTxsResponse {
  repeated PortfolioTx txs = 1;
  string next_page_token = 2;
}

// Holding is the aggregate quantity of an instrument in a portfolio.
message Holding {
  Broker broker = 1;
  string instrument_description = 2;
  double quantity = 3;
  // Resolved instrument id (UUID). Set when identification ran for the underlying txs.
  string instrument_id = 4;
  Instrument instrument = 5;  // optional; set when instrument_id was resolved
}

message GetHoldingsRequest {
  string portfolio_id = 1;
  google.protobuf.Timestamp as_of = 2;
}

message GetHoldingsResponse {
  repeated Holding holdings = 1;
  google.protobuf.Timestamp as_of = 2;
}

// Job status for async ingestion.
enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  PENDING = 1;
  RUNNING = 2;
  SUCCESS = 3;
  FAILED = 4;
}

message ValidationError {
  int32 row_index = 1;
  string field = 2;
  string message = 3;
}

// IdentificationError is recorded when identification fails (e.g. plugin timeout) or broker description only.
message IdentificationError {
  int32 row_index = 1;
  string instrument_description = 2;
  string message = 3;
}

message GetJobRequest {
  string job_id = 1;
}

message GetJobResponse {
  JobStatus status = 1;
  repeated ValidationError validation_errors = 2;
  repeated IdentificationError identification_errors = 3;
}

// ExportInstruments streams all instruments that have at least one canonical identifier. Optional exchange filter.
message ExportInstrumentsRequest {
  string exchange = 1;  // optional; empty = all exchanges
}

// ImportInstruments ensures the given instruments exist (find-or-create by identifiers, merge on conflict). No overwrite of canonical fields for existing.
message ImportInstrumentsRequest {
  repeated Instrument instruments = 1;
}

message ImportInstrumentsResponse {
  int32 ensured_count = 1;
  repeated ImportInstrumentError errors = 2;
}

message ImportInstrumentError {
  int32 index = 1;    // index into request.instruments
  string message = 2;
}
