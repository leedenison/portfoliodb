syntax = "proto3";

package portfoliodb.auth.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/leedenison/portfoliodb/proto/auth/v1;authv1";

// User is minimal user info returned after AuthUser.
message User {
  string id = 1;
  string email = 2;
  string name = 3;
  string role = 4;  // "user" or "admin"
}

// Session contains the session identifier and expiry common to all auth responses.
message Session {
  string session_id = 1; // also returned in the session cookie for browser clients
  google.protobuf.Timestamp expires_at = 2;
}

message AuthUserRequest {
  string google_id_token = 1;
}

message AuthUserResponse {
  User user = 1;
  bool user_exists = 2;  // true if internal user already existed before this AuthUser call
  Session session = 3;
}

message AuthMachineRequest {
  string client_id = 1;
  string client_secret = 2;
}

message AuthMachineResponse {
  Session session = 1;
}

service AuthService {
  // AuthUser verifies the Google ID token, provisions the user if allowlisted, creates a session, and sets the session cookie on the response.
  rpc AuthUser(AuthUserRequest) returns (AuthUserResponse);
  // GetSession returns the current user when the request has a valid session cookie. Used by the SPA to restore auth state on load.
  rpc GetSession(google.protobuf.Empty) returns (AuthUserResponse);
  // Logout deletes the server-side session and clears the session cookie.
  rpc Logout(google.protobuf.Empty) returns (google.protobuf.Empty);
  // AuthMachine authenticates a service account by client_id and client_secret.
  rpc AuthMachine(AuthMachineRequest) returns (AuthMachineResponse);
}
